name: Deploy statische Seite zu GitHub Pages

# Baut NICHT mit Jekyll, sondern lädt die Dateien 1:1 als Pages-Artefakt hoch
# und deployt sie. Ersetzt den klassischen "Deploy from a branch"-Weg, dessen
# interne Jekyll-Pipeline durch die Node-20-Abschaltung (ab 16.06.2026) bricht.

on:
 # push:
 #   branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deploy gleichzeitig; laufende nicht abbrechen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Health-/Version-JSON stempeln
        run: |
          cat > health.json <<EOF
          { "ok": true, "service": "website", "version": "${GITHUB_SHA::7}", "deployed_at": "$(date -u +%FT%TZ)" }
          EOF

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Seite als Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          # Gesamtes Repo-Wurzelverzeichnis ist die Website.
          path: .

      - name: Zu GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
