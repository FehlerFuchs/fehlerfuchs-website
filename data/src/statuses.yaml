# Statusstufen — verbindlich für Website, Badges und Handlungsaufforderungen.
#
# 'weg' und 'wegName' beschreiben zusätzlich den WEG bis zur Veröffentlichung.
# Damit ist die Zeitleiste auf der Produktseite kein eigenes Feld mehr, das
# gepflegt werden müsste, sondern eine Ansicht auf platforms[].status:
# Wo eine Plattform steht, steht der Meilenstein. Sie kann deshalb nicht mehr
# von der Wirklichkeit abdriften — genau das war auf der alten Wunschliste
# passiert, wo MobileReport noch bei „Freigabe & Feinschliff" stand, während
# es längst im Play Store war.
#
# Stufen OHNE 'weg' (idee, pausiert, eingestellt) sind keine Wegpunkte,
# sondern Zustände daneben. Sie unterbrechen die Zeitleiste, statt sie
# fortzusetzen.
# order: kleiner = weiter fortgeschritten. Bestimmt, welcher Plattformstatus
#        den Gesamtstatus eines Produkts gewinnt.
# cta:   welche Handlungsaufforderung diese Stufe überhaupt zulässt.
#        Eine Seite darf niemals eine CTA zeigen, die hier nicht steht.

verfuegbar:
  label: Verfügbar
  short: verfügbar
  color: "#15803D"
  bg: "#E7F3DF"
  border: "#CDE7B6"
  order: 1
  cta: [download, kauf]
  weg: 5
  wegName: Veröffentlicht
  meaning: Öffentlich nutzbar, regulär veröffentlicht.

pruefung:
  label: In Store-Prüfung
  short: in Prüfung
  color: "#9A5B0E"
  bg: "#FEF3E2"
  border: "#F3D9B0"
  order: 2
  cta: [keine]
  weg: 4
  wegName: Beim Store zur Prüfung
  meaning: Beim Store eingereicht, Freigabe steht aus. Kein Download möglich.

beta:
  label: Offene Beta
  short: Beta
  color: "#B45309"
  bg: "#FEF3E2"
  border: "#F3D9B0"
  order: 3
  cta: [download, beta-anmeldung]
  weg: 3
  wegName: Offene Beta
  meaning: Öffentlich testbar, nicht endgültig. Fehler sind zu erwarten.

alpha:
  label: Geschlossene Alpha
  short: Alpha
  color: "#B45309"
  bg: "#FEF3E2"
  border: "#F3D9B0"
  order: 4
  cta: [beta-anmeldung]
  weg: 3
  wegName: Geschlossene Alpha
  meaning: Nur ausgewählte Tester.

entwicklung:
  label: In Entwicklung
  short: in Entwicklung
  color: "#6B5B50"
  bg: "#F1ECE6"
  border: "#E2D6C8"
  order: 5
  cta: [interesse]
  weg: 2
  wegName: In Entwicklung
  meaning: Wird aktiv gebaut. Kein Termin zugesagt.

konzept:
  label: In Planung
  short: geplant
  color: "#6B5B50"
  bg: "#F1ECE6"
  border: "#E2D6C8"
  order: 6
  cta: [interesse]
  weg: 1
  wegName: Konzept
  meaning: Konzipiert, Umsetzung noch nicht begonnen.

idee:
  label: Idee
  short: Idee
  color: "#9C8C80"
  bg: "#F1ECE6"
  border: "#E2D6C8"
  order: 7
  cta: [keine]
  meaning: Gesammelt, noch nicht bewertet.

pausiert:
  label: Pausiert
  short: pausiert
  color: "#9C8C80"
  bg: "#F1ECE6"
  border: "#E2D6C8"
  order: 8
  cta: [keine]
  meaning: Arbeit ruht. Wiederaufnahme offen, aber nicht ausgeschlossen.

eingestellt:
