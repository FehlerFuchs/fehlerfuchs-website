# Anzeigetexte für alle kontrollierten Vokabulare.
#
# Warum eine eigene Datei: Ein technischer Schlüssel wie 'offline-faehig' ist zum
# Sortieren, Filtern und Vergleichen gut – aber nichts, was ein Besucher lesen soll.
# Ohne diese Zuordnung landeten Schlüssel ungefiltert auf der Seite („offline faehig",
# „github release"). Das Prüfskript stellt sicher, dass JEDER im Datenmodell benutzte
# Wert hier einen Text hat.

privacy:
  # Zwei Abstufungen, nicht eine. Bis zum 19.07.2026 trugen alle 15 Produkte
  # 'nur-lokal'. Der Steckbrief-Umlauf hat gezeigt, dass vier davon sehr wohl
  # etwas senden: Update-Prüfung, Lizenzprüfung, Schulferien, Kaufstatus.
  # Inhalte sind es nie – aber 'nur lokal' war trotzdem zu absolut, und ein
  # einziger Gegenbeweis macht auf einer Rechtsseite alles andere unglaubwürdig.
  #
  # Die Trennung nützt doppelt: Sie ist genauer, und sie macht sichtbar, dass
  # CleanDesk oder PDFuchs strenger sind als eine App mit Lizenzprüfung.
  # Geprüft wird beides gegen die Steckbriefe (tools/build_data.py).
  nur-lokal:
    label: nur lokal
    erklaerung: Alle Daten bleiben auf dem Gerät. Es geht nichts nach draußen.
  inhalte-lokal:
    label: Inhalte bleiben auf dem Gerät
    erklaerung: >-
      Was du eingibst und erzeugst, verlässt das Gerät nicht. Nach draußen
      gehen nur technische Abfragen – etwa ob es eine neue Fassung gibt oder
      ob eine Lizenz gilt.
  keine-cloud:
    label: keine Cloud
    erklaerung: Kein Speicher bei uns oder Dritten.
  kein-konto:
    label: kein Konto
    erklaerung: Keine Registrierung, keine Anmeldung.
  # Geschaerft am 21.07.2026. Die alte Erklaerung lautete „Keine Telemetrie,
  # keine Analysedienste." — als pauschale Aussage ist sie nicht haltbar.
  #
  # Der Befund: Wer Googles Abrechnungsbibliothek einbindet (in_app_purchase →
  # com.android.billingclient), bekommt deren Telemetrie mitgeliefert. Sie
  # meldet sich beim App-Start an firebaselogging.googleapis.com, ohne Zutun
  # des Nutzers, und laesst sich nicht offiziell abschalten. Nachgewiesen vom
  # MobileReport-Projekt am gebauten Release 1.1.0+39, mit Gegenprobe: Der
  # Enterprise-Bau ohne Billing enthaelt davon nichts.
  #
  # Warum das Merkmal trotzdem bleibt: Fuer den Besucher zaehlt, dass NIEMAND
  # bei FehlerFuchs mitliest — kein Analysedienst, keine Auswertung, keine
  # Profile. Das stimmt weiterhin. Es zu streichen hiesse zu verschweigen, dass
  # wir nichts tun; es unveraendert zu lassen hiesse zu verschweigen, was Google
  # tut. Beides waere falsch, also sagt die Erklaerung jetzt beides.
  # Label am 21.07.2026 von „kein Tracking" auf „kein Tracking durch uns"
  # geschaerft. Anlass war die SnapFuchs-Aktion: Die Play-Abrechnungs-
  # bibliothek sendet eigene Betriebsdaten an Google, und „kein Tracking" auf
  # einer Karte ist die staerkere Aussage als das, was wir halten koennen.
  #
  # Bewusst KEIN eigenes Merkmal nur fuer SnapFuchs: Ein Merkmal, das genau
  # ein Produkt traegt, ist kein Vokabular, sondern eine Ausnahme mit Etikett.
  # Die drei Woerter gelten fuer alle 15 Produkte; wo es keinen In-App-Kauf
  # gibt, schraenken sie nichts ein.
  kein-tracking:
    label: kein Tracking durch uns
    erklaerung: >-
      FehlerFuchs erhebt nichts über dich und wertet nichts aus – keine
      Analysedienste, keine Profile, keine Reichweitenmessung. Bei Apps mit
      In-App-Kauf sendet Googles Abrechnungsbibliothek eigene Telemetrie an
      Google, auf die wir keinen Einfluss haben.
  werbefrei:
    label: werbefrei
    erklaerung: Keine Werbung, keine Werbenetzwerke.
  # Geschaerft am 20.07.2026. Die alte Erklaerung lautete „Keine
  # Google-Dienste eingebunden." — sie fragte nach der HERKUNFT des Codes.
  # Fuer einen Besucher zaehlt aber der DATENFLUSS: Ihn interessiert nicht,
  # wer die Bibliothek geschrieben hat, sondern ob seine Daten irgendwo landen.
  #
  # Der Unterschied war nicht theoretisch: SnapFuchs trug das Merkmal, obwohl
  # es beim App-Start den Kaufstatus bei Google Play abfragt. OrgaFuchs trug
  # es und rechnet mit Google ML Kit — aber vollstaendig auf dem Geraet.
  # Nach altem Wortlaut waren beide falsch, nach neuem ist nur SnapFuchs es.
  kein-google:
    label: ohne Google-Verbindung
    erklaerung: >-
      Es geht nichts an Google-Server – kein Konto, keine Abrechnung, keine
      Karten, keine Schriften aus dem Netz. Mitgelieferte Bibliotheken, die
      auf dem Gerät rechnen und nichts senden, sind davon nicht berührt.
  eigener-sync:
    label: eigener Sync
    erklaerung: Abgleich über das eigene Netz oder einen selbst betriebenen Relay.
  offline-faehig:
    label: offlinefähig
    erklaerung: Voll nutzbar ohne Internetverbindung.

