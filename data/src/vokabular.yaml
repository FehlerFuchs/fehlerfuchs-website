os:
  windows: { label: Windows }
  android: { label: Android }
  ios:     { label: iOS }
  linux:   { label: Linux }
  macos:   { label: macOS }
  web:     { label: Browser }

# Werte der Merkmalsmatrix. 'art' steuert die Darstellung:
#   enthalten | fehlt | teilweise | spaeter | positiv
# 'positiv' ist für Werte, bei denen das WORT die Aussage trägt und ein Häkchen
# sie verschlucken würde – „kostenlos" ist mehr als nur „enthalten".
featureWerte:
  ja:
    label: enthalten
    zeichen: "✓"
    art: enthalten
  nein:
    label: nicht enthalten
    zeichen: "✕"
    art: fehlt
  optional:
    label: optional
    erklaerung: Als Zusatzpaket installierbar.
    art: teilweise
  teilweise:
    label: teilweise
    erklaerung: Eingeschränkt enthalten.
    art: teilweise
  geplant:
    label: geplant
    erklaerung: Vorgesehen, Umsetzung noch nicht begonnen.
    art: spaeter
  in-arbeit:
    label: in Arbeit
    erklaerung: Wird gerade gebaut.
    art: spaeter
  in-vorbereitung:
    label: in Vorbereitung
    erklaerung: Kommt, Termin noch offen.
    art: spaeter
  fast-fertig:
    label: fast fertig
    erklaerung: Lauffähig, es fehlen nur noch Kleinigkeiten.
    art: teilweise
  kostenlos:
    label: kostenlos
    erklaerung: Ohne Kosten und ohne Verpflichtung.
    art: positiv
  nach-absprache:
    label: nach Absprache
    erklaerung: Möglich, wird im Einzelfall vereinbart.
    art: teilweise

# Wunscherfüller: Status eines eingereichten Wunsches.
# Farben wie bei den Produktstatus – dieselbe Sprache für dasselbe Konzept.
wunschStatus:
  neu:
    label: Neu
    erklaerung: Eingegangen, noch nicht bewertet.
    color: "#6B5B50"
    bg: "#F1ECE6"
    border: "#E2D6C8"
    order: 1
  in-bearbeitung:
    label: In Bearbeitung
    erklaerung: Aufgenommen – daran wird gearbeitet.
    color: "#B45309"
    bg: "#FEF3E2"
    border: "#F3D9B0"
    order: 2
  umgesetzt:
    label: Umgesetzt
    erklaerung: Fertig. Aus dem Wunsch ist etwas geworden.
    color: "#15803D"
    bg: "#E7F3DF"
    border: "#CDE7B6"
    order: 3
  nicht-umsetzbar:
    label: Nicht umsetzbar
    erklaerung: Geht leider nicht – die Begründung steht im Kommentar.
    color: "#9C8C80"
    bg: "#F1ECE6"
    border: "#E2D6C8"
    order: 4

# Worum es in einem Wunsch geht. Steuert zugleich das Formular:
# 'wunsch-bestehend' blendet die Produktauswahl ein.
wunschThema:
  app-idee:
    label: App-Idee
    erklaerung: Eine Idee für etwas, das es noch nicht gibt.
  anwendungswunsch:
    label: Anwendungswunsch
    erklaerung: Ein konkretes Problem, für das eine Anwendung fehlt.
  wunsch-bestehend:
    label: Wunsch zu einer FehlerFuchs-Anwendung
    erklaerung: Etwas, das an einer bestehenden App anders sein sollte.
  sonstiges:
    label: Sonstiges
    erklaerung: Alles Übrige.

# Meilensteine der Zeitleiste („Der Weg zum Release").
meilensteinStand:
  erledigt:
    label: erledigt
    color: "#15803D"
    bg: "#E7F3DF"
    border: "#CDE7B6"
  laufend:
    label: aktuell
    color: "#B45309"
    bg: "#FEF3E2"
    border: "#F3D9B0"
  geplant:
    label: geplant
    color: "#6B5B50"
    bg: "#F1ECE6"
    border: "#E2D6C8"
  pausiert:
    label: pausiert
    color: "#9C8C80"
    bg: "#F1ECE6"
    border: "#E2D6C8"
