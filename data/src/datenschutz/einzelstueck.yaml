offene_fragen: >-
  1) Wie sollen einzelne Anfertigungen datenschutzseitig erfasst werden – jede
  ausgelieferte Lösung läuft beim Kunden und ist ein eigenes Produkt; ob und in welcher
  Form dafür eigene Steckbriefe entstehen, ist mit dem WEBSEITE-Projekt zu klären.
  2) Ob bei Kundenprojekten eine Auftragsverarbeitung nach Art. 28 DSGVO nötig wird,
  ist rechtlich zu prüfen und noch nicht entschieden.
