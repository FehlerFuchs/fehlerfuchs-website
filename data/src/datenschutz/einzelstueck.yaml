loeschung: >-
  Es gibt keine Anwendung und damit keine Nutzerdaten. Daten, die im Rahmen eines
  konkreten Auftrags vom Kunden bereitgestellt werden, liegen ausschließlich lokal
  beim Auftragnehmer, werden nach Projektende gelöscht und die Löschung wird im
  jeweiligen Auftragsordner protokolliert.

besonderheiten: >-
  EinzelStück ist eine Dienstleistung (individuell beauftragte Softwarelösungen für
  Betriebe), kein Produkt zum Herunterladen. Es existiert derzeit weder eine Anwendung
  noch ein laufender Auftrag; der Projektordner enthält ausschließlich Text- und
  Grafikdateien (Konzept, Vorlagen, Prozess). Datenschutzrelevant wird erst die einzelne
  Anfertigung: Jede ausgelieferte Lösung ist ein eigenständiges Produkt beim Kunden und
  braucht dann eine eigene Betrachtung. Vom Kunden gelieferte Beispieldaten werden
  bewusst sparsam angenommen, nicht weitergegeben und nach Projektende gelöscht.

