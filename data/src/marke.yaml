# Die Marke: Haltung, Versprechen, Person.
#
# Warum hier und nicht in einer Seitendatei: Diese Sätze sind kein Seitentext,
# sondern das Versprechen, an dem alles andere gemessen wird. Sie tauchen auf
# der Startseite auf, gehören in Presseunterlagen, in den Play-Store-Eintrag
# und in Flyer. Steht die Haltung an einer Stelle, kann sie nicht an fünf
# Stellen leicht unterschiedlich klingen.

name: FehlerFuchs
slogan: Einfach kleine Helfer.
untertitel: Kleine, lokale Helfer-Apps – mit Haltung.
claim: Kleine, lokale Helfer-Apps – datensparsam, ohne Cloud und ohne Tracking.

# Die sechs Leitsätze. Jeder ist ein Versprechen, das die Produkte einlösen
# müssen – die Datenschutz-Merkmale im Produktmodell sind die Belege dafür.
leitsaetze:
  - titel: Einfach & ehrlich
    text: löst ein konkretes Problem, sonst nichts.
  - titel: Datensparsam
    text: ohne Cloud, Tracking oder Konto.
  - titel: Lokal
    text: deine Daten bleiben bei dir.
  - titel: Fair
    text: werbefrei; das Grundlegende bleibt immer frei.
  - titel: Transparent
    text: du behältst die Kontrolle, Daten jederzeit löschbar.
  - titel: Verständlich
    text: klare Sprache statt Fachchinesisch.

# Der Mensch hinter der Marke. Bewusst sichtbar: Wer sein Gesicht zeigt,
# steht für seine Arbeit ein – das ist bei einem Ein-Personen-Projekt keine
# Kosmetik, sondern das eigentliche Vertrauensangebot.
person:
  name: Matthias Schacht
  rufname: Matze
  signatur: — Matthias (Matze) von FehlerFuchs
  portrait:
    src: /img/matze-portrait-sw.jpg
    alt: Matthias Schacht, Gründer von FehlerFuchs
    width: 480
    height: 720
    # Bildmittelpunkt für runde/quadratische Ausschnitte. Das Foto ist
    # Hochformat, der Kopf sitzt im oberen Drittel – bei mittigem Zuschnitt
    # (50% 50%) fiele der Scheitel heraus. Kleinere Zahl = weiter oben.
    # Zum Nachjustieren genügt diese eine Zeile.
    fokus: 50% 12%

# „Die Idee" – der persönliche Text der Startseite. Absatzweise, damit die
# Darstellung ihn nicht zerschneiden muss.
idee:
  ueberschrift: FehlerFuchs – die Idee
  absaetze:
    - >-
      Hinter FehlerFuchs steht kein riesiges Softwareunternehmen und kein großes Team –
      nur ich, Matze. Mich hat es schon immer gereizt, Abläufe einfacher zu machen:
      Dinge, die im Alltag umständlich sind, so lange zu drehen, bis sie rund laufen.
    - >-
      Die Apps entstehen komplett in meiner Freizeit – einfach, weil mir genau dieses
      Tüfteln Spaß macht. Mein Anspruch dabei: kleine, ehrliche Werkzeuge, die ein
      konkretes Problem lösen und sonst nichts. Datensparsam, ohne Cloud, ohne Tracking,
      ohne Konto – die Daten bleiben dort, wo sie hingehören: bei dir.
    - >-
      Es wird kostenlose Apps geben – und einzelne Apps mit optionaler Pro-Version, die
      noch individueller ist oder mehr Funktionen bietet. Wichtig ist mir aber: Das
      Wesentliche, das man grundlegend braucht, steckt immer schon in der kostenlosen
      Version. Natürlich soll FehlerFuchs Geld verdienen und meine Arbeit tragen. Aber
      nicht mit Druck, künstlichen Abhängigkeiten oder dem Ziel, ein Monopol aufzubauen.
      Fair, schlank und auf Augenhöhe.
    - >-
      FehlerFuchs ist der Rahmen, unter dem nach und nach mehrere solcher Helfer
      entstehen. MobileReport war der Anfang – inzwischen wächst die Familie Stück für
      Stück (Programme für den PC, weitere Apps in Arbeit). Wenn dir etwas auffällt oder
      fehlt, freue ich mich über jede Rückmeldung.

kontakt:
  ueberschrift: Kontakt
  text: >-
    Fragen, Interesse oder Feedback? Schreib mir über das kurze Kontaktformular –
    ich melde mich per E-Mail oder (auf Wunsch) telefonisch zurück.
