# Die Marke: Haltung, Versprechen, Person.
#
# Warum hier und nicht in einer Seitendatei: Diese Sätze sind kein Seitentext,
# sondern das Versprechen, an dem alles andere gemessen wird. Sie tauchen auf
# der Startseite auf, gehören in Presseunterlagen, in den Play-Store-Eintrag
# und in Flyer. Steht die Haltung an einer Stelle, kann sie nicht an fünf
# Stellen leicht unterschiedlich klingen.

name: FehlerFuchs
slogan: Einfach kleine Helfer.
untertitel: Kleine, lokale Helfer-Apps – mit Haltung.
claim: Kleine, lokale Helfer-Apps – datensparsam, ohne Cloud und ohne Tracking.

# Die sechs Leitsätze. Jeder ist ein Versprechen, das die Produkte einlösen
# müssen – die Datenschutz-Merkmale im Produktmodell sind die Belege dafür.
leitsaetze:
  - titel: Einfach & ehrlich
    text: löst ein konkretes Problem, sonst nichts.
  - titel: Datensparsam
    text: ohne Cloud, Tracking oder Konto.
  - titel: Lokal
    text: deine Daten bleiben bei dir.
  - titel: Fair
    text: werbefrei; das Grundlegende bleibt immer frei.
  - titel: Transparent
    text: du behältst die Kontrolle, Daten jederzeit löschbar.
  - titel: Verständlich
    text: klare Sprache statt Fachchinesisch.

# Der Mensch hinter der Marke. Bewusst sichtbar: Wer sein Gesicht zeigt,
