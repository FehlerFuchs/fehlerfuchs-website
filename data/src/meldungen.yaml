# Aktuelles — Meldungen
# =====================
#
# Geprüft gegen data/schema/meldung.schema.json.
#
# Der Grundsatz dieser Datei ist der wichtigste am ganzen Modell:
#
#     Eine Meldung wiederholt KEINE Tatsache, die schon beim Produkt steht.
#
# Version, Datum, Download-Adresse, Store-Link und Produktname kommen aus
# data/src/products/*.yaml. Hier steht nur, was der Feed zusätzlich braucht:
# eine Überschrift und ein paar Sätze in normaler Sprache.
#
# Warum so streng: Genau hier ist die Website schon einmal auseinandergelaufen.
# Auf der Startseite stand „Beta pausiert", während die Beta lief — weil die
# Aussage an zwei Stellen gepflegt werden musste und eine davon vergessen wurde.
# Wenn das Datum nur einmal existiert, kann es nicht mehr widersprüchlich sein.
#
# Reihenfolge in dieser Datei ist egal; sortiert wird beim Erzeugen nach Datum.
# Neue Einträge trotzdem bitte oben anfügen — dann liest sich die Datei wie der Feed.
#
# Prüfregeln, die auf diese Datei angewendet werden (tools/build_data.py):
#   • jeder Release eines Produkts braucht eine Meldung          → Warnung
#   • produkt und version müssen im Modell existieren            → Fehler
#   • datum darf einem Release/„since" nicht widersprechen       → Fehler
#   • eine Versionsnummer im Titel muss zur Version passen       → Fehler
#   • ziel.url darf nicht wiederholen, was automatisch entsteht  → Warnung
#   • ids sind eindeutig und ändern sich nie                     → Fehler

meldungen:

  - id: orgafuchs-play-ablehnung-2026-07
    typ: store
    produkt: orgafuchs
    datum: "2026-07-18"
    titel: OrgaFuchs für Android – von der Prüfsoftware abgelehnt, Widerspruch läuft
    text: >-
      Eingereicht und noch am selben Tag zurück. Die automatische Prüfung von
      Google hat die Einstellungsseite für den Gruppen-Sync als Bezahlschranke
      oder nicht deklarierten Login gewertet. Beides ist sie nicht: Dort trägt
      man eine Relay-Adresse und ein selbst gewähltes Gruppen-Passwort ein, um
      die eigenen Geräte zu verbinden. Kein Konto, keine Anmeldung, keine
      Zahlung. Der Widerspruch läuft; er kostet voraussichtlich sieben bis
      vierzehn Tage. Was mich dabei ärgert, ist nicht die Prüfung – die ist
      richtig –, sondern dass eine unsichere Maschine durchentscheidet, statt
      einen Menschen dazuzuholen. Windows bleibt verfügbar.

  - id: orgafuchs-1-0-0
    typ: veroeffentlichung
    produkt: orgafuchs
    version: "1.0.0"
    # Kein datum: es steht beim Release und wird von dort geholt.
    titel: OrgaFuchs 1.0.0 – für Windows da, Android in Arbeit
    text: >-
      Der lokale Familien- und Schichtplaner ist fertig für Windows. Monatskalender,
      Schnelleintrag, PDF als Monat, Jahr oder Blanko-Vorlage, dazu Feiertage und
      Schulferien je Bundesland. Die Geräte gleichen sich per QR-Code direkt
      untereinander ab – ohne Cloud, ohne Google, ohne Konto. Die Android-Fassung
      wird gerade gebaut.

  - id: pdfuchsreader-play-regulaer
    typ: store
    produkt: pdfuchsreader
    # Datum ergibt sich aus platforms[android].since und wird von dort geholt.
    titel: PDFuchs Reader ist jetzt regulär im Play Store
    text: >-
      Der offene Test ist vorbei: Der kostenlose, werbefreie PDF-Reader für Android
      steht ab sofort regulär im Google Play Store. Lesen, suchen, teilen, drucken
      und Seiten leicht bearbeiten – alles bleibt auf dem Gerät.

  - id: gewerbepro-0-3-1
    typ: update
    produkt: gewerbepro
    version: "0.3.1"
    titel: GewerbePro 0.3.1 – Logo, Farben und Unterschrift
    text: >-
      Belege tragen jetzt das eigene Firmenlogo, die Programmfarben lassen sich frei
      einstellen und in die gemeinsame Beleg-Fußzeile passt eine hinterlegte
      Unterschrift. Der eingebaute PDFuchs bekommt einen QR-Code-Generator und kann
      unter Windows direkt scannen. Wer die Beta schon nutzt, findet das Update in
      der App unter „Auf Updates prüfen".

  - id: gewerbepro-0-3-0
    typ: test
    produkt: gewerbepro
    version: "0.3.0"
    titel: "GewerbePro 0.3.0: die offene Beta ist da"
    text: >-
      Die lokale Büro-Software für Windows steht erstmals öffentlich zum Testen bereit.
      Die Gewerbe-Edition ist kostenlos und läuft sofort los. Für die Pro-Funktionen
      gibt es während der Beta eine 90-Tage-Testlizenz automatisch per E-Mail.
      Rückmeldungen sind ausdrücklich erwünscht – dafür ist eine Beta da.

  - id: pdfuchsreader-offener-test
    typ: test
    produkt: pdfuchsreader
    datum: "2026-07-14"
    titel: PDFuchs Reader im offenen Test
    text: >-
      Der PDF-Reader für Android geht in den offenen Test bei Google Play. Lesen,
      durchsuchen, teilen, drucken und Seiten leicht bearbeiten – ohne Werbung, ohne
      Konto, vollständig auf dem Gerät.

  - id: mobilereport-1-1-0-pro
    typ: update
    produkt: mobilereport
    # Play-Store-App: Versionen verwaltet der Store, deshalb kein Release im Modell
    # und damit auch kein abgeleitetes Datum.
    datum: "2026-07-12"
    titel: MobileReport 1.1.0 – Pro als einmaliger Kauf
    text: >-
      Pro schaltet man jetzt mit einem einmaligen In-App-Kauf frei: fünf Euro,
      kein Abo, dauerhaft und auf allen Geräten mit demselben Google-Konto. Dazu
      gehören der Admin-Bereich mit Master-Passwort, eigenes Branding in App und PDF
      sowie einstellbare Logbuch-Zähler.

  - id: mobilereport-enterprise-1-0-1
    typ: update
    produkt: mobilereport-enterprise
    version: "1.0.1"
    titel: MobileReport Enterprise 1.0.1
    text: >-
      Meldungen bekommen einen Betreff, Fotos lassen sich per Ziehen sortieren – das
      erste Bild ist das Hauptbild. Der Name ist Pflichtfeld und kann als Standard
      gespeichert werden, die höchste Bildanzahl ist einstellbar und das Profil kennt
      jetzt Position beziehungsweise Funktion. Die Einstellungen wurden neu geordnet.

  - id: mobilereport-free-play
    typ: store
    produkt: mobilereport
    datum: "2026-07-09"
    titel: MobileReport ist jetzt im Play Store
    text: >-
      Das kleine Melde-Logbuch für Geräte und Anlagen steht ab sofort im Google Play
      Store: Beschreibung, Fotos, Ort und Zeit erfassen, daraus ein sauberes PDF und
      eine vorbereitete E-Mail. Alles bleibt auf dem Gerät.

  - id: mobilereport-enterprise-1-0-0
    typ: veroeffentlichung
    produkt: mobilereport-enterprise
    version: "1.0.0"
    titel: MobileReport Enterprise – die Fassung für Firmen
    text: >-
      Für Betriebe, die MobileReport auf mehreren Geräten mit eigenem Erscheinungsbild
      einsetzen wollen: Firmenname, Logo und Farben werden einmal im Browser
      zusammengestellt und als Datei auf die Geräte gebracht. Die App wird direkt
      geliefert, nicht über den Play Store – es gibt sie pro Gerät und gestaffelt.
