slug: pdfuchsreader
name: PDFuchs Reader
fullName: FehlerFuchs PDFuchs Reader
kind: produkt
tagline: Der kostenlose, werbefreie PDF-Reader für Android – lesen, suchen, teilen, drucken, Seiten bearbeiten.
description: >-
  PDF-Viewer für Android, der ohne Konto und ohne Werbung auskommt: lesen, durchsuchen,
  teilen, drucken und Seiten leicht bearbeiten. Alles passiert lokal auf dem Gerät.
  Der mobile Zwilling der PDFuchs-Familie.
audience: [privat, selbststaendige, unternehmen]
accent: "#9F1239"
status: verfuegbar

platforms:
  - os: android
    status: verfuegbar
    distribution: play-store
    storeId: eu.fehlerfuchs.pdfuchsreader
    since: "2026-07-18"

privacy: [nur-lokal, keine-cloud, kein-konto, kein-tracking, werbefrei, offline-faehig]

editions:
  - id: standard
    name: PDFuchs Reader
    public: true
    summary: Voller Funktionsumfang, dauerhaft kostenlos und werbefrei.
    price: { model: kostenlos }

releases: []

# Funktionsübersicht. Übernommen aus den Abschnitten „Funktionen" und
# „Was (noch) nicht dabei ist" auf apps/pdfuchsreader.html.
#
# Die letzte Gruppe ist Absicht: Was eine App bewusst NICHT tut, gehört auf die
# Seite. Wer OCR sucht, soll das hier erfahren und nicht erst nach dem Herunterladen.
features:
  - group: Lesen
    items:
      - name: PDFs flüssig anzeigen, scrollen und zoomen
        values: { standard: ja }
        note: Auf Grundlage der bewährten Render-Engine PDFium.
      - name: Dunkelmodus
        values: { standard: ja }
      - name: Volltextsuche mit hervorgehobenen Treffern
        values: { standard: ja }
      - name: Miniaturübersicht und schneller Seitensprung
        values: { standard: ja }

  - group: Weitergeben
    items:
      - name: Dokument teilen
        values: { standard: ja }
      - name: Über den Android-Druckdialog ausdrucken
        values: { standard: ja }
      - name: PDFs aus anderen Apps direkt öffnen („Öffnen mit")
        values: { standard: ja }
      - name: Verlauf zuletzt geöffneter Dokumente
        values: { standard: ja }

  - group: Bearbeiten
    items:
      - name: Seiten drehen, löschen und neu ordnen
        values: { standard: ja }
      - name: Als Kopie speichern – das Original bleibt unverändert
        values: { standard: ja }
        note: Verlustfrei; die Ausgangsdatei wird nie überschrieben.

  - group: Bewusst nicht dabei
    items:
      - name: Texterkennung (OCR) aus Bildern
        values: { standard: nein }
        note: Weggelassen, damit der Reader schnell und schlank bleibt.
      - name: Formularfelder ausfüllen und unterschreiben
        values: { standard: geplant }
      - name: Voller PDF-Funktionsumfang
        values: { standard: nein }
        note: Bleibt der PDFuchs-Suite für Windows vorbehalten.
      - name: Werbung, Konto oder Tracking
        values: { standard: nein }

# Bild-Wortmarke. Ist sie gesetzt, ist SIE der sichtbare Titel und die
# Überschrift steht nur für Screenreader da – sonst stünde der Name doppelt.
media:
  lockup:
    src: /img/lockups/pdfuchsreader.svg
    alt: PDFuchs Reader – von FehlerFuchs
    width: 1180
    height: 300

links:
  page: /apps/pdfuchsreader.html
  store: https://play.google.com/store/apps/details?id=eu.fehlerfuchs.pdfuchsreader
  contact: /kontakt.html?app=PDFuchs%20Reader&topic=interesse

notes: Seit 18.07.2026 regulär im Play Store, davor offener Test.
