  # habe keine eigene Seite, obwohl es sie seit einem Tag hatte.
  #
  # Fehlt das Feld, gab es vorher keine eigene Seite - dann ist auch nichts
  # weiterzuleiten.
  alt_html: /apps/pdfuchsreader.html
  contact: /kontakt.html?app=PDFuchs%20Reader&topic=interesse

notes: Seit 18.07.2026 regulär im Play Store, davor offener Test.
