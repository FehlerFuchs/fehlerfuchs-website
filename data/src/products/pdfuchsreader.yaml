    - src: /img/screenshots/pdfuchsreader/handy-02-lesen.png
      alt: "Werbebild „PDFs schnell öffnen und flüssig lesen“ mit einem geöffneten Handbuch und der Seitenanzeige am unteren Rand"
      width: 620
