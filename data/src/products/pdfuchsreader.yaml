  # gerechnet. Es sind Werbebilder mit Überschrift, keine nackten
  # Bildschirmabzüge - der Alternativtext sagt das auch so.
  screenshots:
    - src: /img/screenshots/pdfuchsreader/handy-01-start.png
      alt: "Werbebild „Kostenlos, werbefrei, ohne Tracking“ mit dem Startbildschirm: Knopf PDF öffnen und die Liste zuletzt geöffneter Dateien"
