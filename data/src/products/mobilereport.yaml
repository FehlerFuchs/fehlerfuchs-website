slug: mobilereport
name: MobileReport
fullName: FehlerFuchs MobileReport
kind: produkt
tagline: Das kleine, lokale Melde-Logbuch für Geräte – schnell erfasst, sauber als PDF, direkt per Mail vorbereitet.
description: >-
  Meldungen zu Geräten und Anlagen unterwegs erfassen: Beschreibung, Fotos, Ort und
  Zeitpunkt, daraus ein sauberes PDF und eine vorbereitete E-Mail. Alles bleibt auf dem
  Gerät – kein Konto, keine Cloud, keine Werbung.
audience: [selbststaendige, unternehmen, vereine]
accent: "#C2410C"   # Farbe der App
status: verfuegbar

platforms:
  - os: android
    status: verfuegbar
    distribution: play-store
    storeId: eu.fehlerfuchs.mobilereport

privacy: [nur-lokal, keine-cloud, kein-konto, kein-tracking, werbefrei, offline-faehig]

editions:
  - id: free
    name: MobileReport Free
    public: true
    summary: Grundfunktionen zum Erfassen und als PDF Ausgeben.
    price: { model: kostenlos }
  - id: pro
    name: MobileReport Pro
    public: true
    emphasis: true
    summary: >-
      Voller Funktionsumfang, freigeschaltet per einmaligem In-App-Kauf.
      Pro gab es anfangs als eigene App; sie ist im Einzelkauf innerhalb von
      MobileReport aufgegangen und wird nicht mehr getrennt weitergebaut.
    price: { model: iap, amount: 5.00, currency: EUR, vatIncluded: true, recurring: false }

# Merkmalsmatrix. Übernommen aus der Vergleichstabelle auf apps/mobilereport.html –
# also aus dem, was heute schon veröffentlicht ist, nicht neu erdacht.
#
# Die dritte Spalte ist kein Tippfehler: 'mobilereport-enterprise' ist ein eigenes
# Produkt (parent + standalone), aus Käufersicht aber schlicht die dritte Stufe
# derselben App. Ihn für den Vergleich auf eine andere Seite zu schicken, hieße den
# Vergleich zu zerreißen, den er gerade anstellt. Die Prüfung lässt Spalten von
# eigenständigen Ausbaustufen deshalb ausdrücklich zu.
features:
  - group: Grundlage
    items:
      - name: Erfassen, Fotos, PDF, E-Mail-Entwurf und Logbuch
        values: { free: ja, pro: ja, mobilereport-enterprise: ja }
      - name: Vollständig lokal und werbefrei
        values: { free: ja, pro: ja, mobilereport-enterprise: ja }

  - group: Vorgaben für das Team
    items:
      - name: Feste Bereiche, Kategorien und Pflichtfelder
        values: { free: nein, pro: ja, mobilereport-enterprise: ja }
      - name: Admin-Bereich mit Master-Passwort (geschütztes Berichtsformat)
        values: { free: nein, pro: ja, mobilereport-enterprise: ja }
      - name: Vorkonfiguration per CSV (Bereiche, Standorte, Empfänger)
        values: { free: nein, pro: ja, mobilereport-enterprise: ja }

  - group: Logbuch
    items:
      - name: Filter und Suche im Logbuch
        values: { free: teilweise, pro: ja, mobilereport-enterprise: ja }
        note: Kostenlos gibt es die Grundsuche; die erweiterten Filter sind ab Pro dabei.
      - name: Eigene Zählweise und Muster für Dateinamen
        values: { free: teilweise, pro: ja, mobilereport-enterprise: ja }
        note: Kostenlos gilt die feste Standardzählung.

  - group: Erscheinungsbild
    items:
      - name: Branding und Farbschema
        values:
          free: nein
          pro: "Firmenlogo · 15 Vorlagen"
          mobilereport-enterprise: "frei wählbar: Logo, Farben, Name"
      - name: App unter eigenem Namen und Symbol
        values: { free: nein, pro: nein, mobilereport-enterprise: "nur Custom-Branding" }

  - group: Verteilung und Freischaltung
    items:
      - name: Bezugsweg
        values:
          free: "Google Play · kostenlos"
          pro: "In-App-Kauf in der App"
          mobilereport-enterprise: "Direkt-Download außerhalb von Play"
      - name: Freischaltung
        values:
          free: nein
          pro: "einmaliger Kauf, geräteübergreifend"
          mobilereport-enterprise: "Lizenzschlüssel je Arbeitsplatz"
      - name: Anbindung an eigene Systeme
        values: { free: nein, pro: nein, mobilereport-enterprise: "nur Custom-Branding" }

# Play-Store-Apps haben bei uns keine Release-Einträge: Version, Datum und Größe
# verwaltet der Store. Eine zweite Angabe hier wäre sofort veraltet.
releases: []

# Bild-Wortmarke. Ist sie gesetzt, ist SIE der sichtbare Titel und die
# Überschrift steht nur für Screenreader da – sonst stünde der Name doppelt.
media:
  lockup:
    src: /img/lockups/mobilereport.png
    alt: MobileReport – von FehlerFuchs
    width: 1333
    height: 322
  # Aus dem Play-Store-Satz des Projekts übernommen und auf Webgröße
  # gerechnet. Es sind Werbebilder mit Überschrift, keine nackten
  # Bildschirmabzüge - der Alternativtext sagt das auch so.
  screenshots:
    - src: /img/screenshots/mobilereport/handy-01-start.png
      alt: "Werbebild „Melden in Sekunden“ mit dem Startbildschirm: die Kacheln Neue Meldung, Logbuch, Einstellungen, Hinweise und Datenschutz"
      width: 620
      height: 1102
      geraet: handy
      titel: "Melden in Sekunden"
    - src: /img/screenshots/mobilereport/handy-02-meldearten.png
      alt: "Werbebild „Klare Meldearten“ mit der aufgeklappten Auswahlliste – Gerätedefekt, Fehlfunktion, Beschädigung, Hygiene und weitere"
      width: 620
      height: 1102
      geraet: handy
      titel: "Klare Meldearten"
    - src: /img/screenshots/mobilereport/handy-03-pdf.png
      alt: "Werbebild „Sauberes PDF“ mit der PDF-Vorschau und dem Hinweisfenster, das vor dem Senden auf personenbezogene Inhalte hinweist"
      width: 620
      height: 1102
      geraet: handy
      titel: "Sauberes PDF"
    - src: /img/screenshots/mobilereport/handy-04-logbuch.png
      alt: "Werbebild „Alles im Logbuch“ mit einer einzelnen Meldung: Nummer, Datum, Bereich, Empfänger, Beschreibung und angehängtem Foto"
      width: 620
      height: 1102
      geraet: handy
      titel: "Alles im Logbuch"
    - src: /img/screenshots/mobilereport/handy-05-einstellungen.png
      alt: "Werbebild „Lokal und datensparsam“ mit den Einstellungen und dem aufgeklappten Bereich Empfänger"
      width: 620
      height: 1102
      geraet: handy
      titel: "Lokal und datensparsam"
# Farben der Produktseite, 1:1 aus dem Quelltext der App übernommen.
# Was dort nicht steht, steht auch hier nicht – dann greift der Standard.
# Alle Kontraste rechnet das Prüfskript, sie sind nicht geschätzt.
theme:
  modus: hell
  hintergrund: "#FFF7ED"  # cream
  flaeche: "#FFFFFF"      # white
  text: "#2B160B"         # darkBrown
  akzent: "#C2410C"       # action
  quelle: FehlerFuchs Mobile Report/FehlerFuchsMR/lib/core/constants/app_colors.dart

links:
  page: /apps/mobilereport.html
  store: https://play.google.com/store/apps/details?id=eu.fehlerfuchs.mobilereport
  contact: /kontakt.html?app=MobileReport&topic=interesse
