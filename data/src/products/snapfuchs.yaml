slug: snapfuchs
name: SnapFuchs
fullName: FehlerFuchs SnapFuchs
kind: produkt
# „ohne Google" am 20.07.2026 gestrichen — dieselbe Begründung wie beim
# Merkmal weiter unten: Die App fragt beim Start den Kaufstatus der
# Pro-Fassung bei Google Play ab. Die Tagline steht ganz oben auf der
# Produktseite und ist damit die sichtbarste Zusage von allen.
tagline: Lokaler Dokumenten-Scanner für Android – ohne Cloud, ohne Konto.
description: >-
  Dokumente mit der Kamera erfassen, gerade rücken, als PDF ablegen – alles auf dem
  Gerät. Kein Upload zu einem Scan-Dienst, keine Anmeldung, keine Werbung.
  Für den einmaligen Kauf der Pro-Fassung fragt die App beim Start den
  Kaufstatus bei Google Play ab – das verlangt der Play Store so. Deine Scans,
  Bilder und PDFs sieht Google nie; sie verlassen das Gerät nicht.
audience: [privat, selbststaendige]

# Akzent für Listen und Karten auf hellem Grund (Produktübersicht, Downloads).
# Der Ton stammt aus der App, ist für hellen Grund aber abgedunkelt: Das helle
# #F4A261 der App käme auf Weiß nur auf Kontrast 2,1 und wäre unlesbar.
# #A85C24 kommt auf 4,97 gegen Weiß und 4,66 gegen den Seitengrund – beides
# über der Schwelle von 4,5. Nachgerechnet, nicht geschätzt.
accent: "#F4A261"   # Farbe der App

# Die Produktseite übernimmt die Farben der App. SnapFuchs ist ein
# Kamerawerkzeug – dunkel zu sein ist dort kein Geschmack, sondern Funktion:
# Ein heller Bildschirm blendet beim Scannen. Das darf die Seite zeigen.
#
# Werte 1:1 aus dem Quelltext der App, nicht nachempfunden.
theme:
  modus: dunkel
  hintergrund: "#1A1A1A"      # hintergrundDunkel
  flaeche: "#2A2A2A"          # hintergrundKarte
  rand: "#3D3A36"
  text: "#F0E8DC"             # textPrimaer
  textLeise: "#B0A090"        # textSekundaer
  akzent: "#F4A261"           # akzentOrange
  quelle: FehlerFuchs_SnapFuchs/05_App/snapfuchs/lib/app/theme.dart
# Kein Bild-Lockup vorhanden – der Titel steht als Text und trägt
# die Markenfarben, damit er trotzdem nach FehlerFuchs aussieht.
wordmark:
  - { text: "FehlerFuchs ", color: "#7C3F16", weight: normal }
  - { text: "Snap", color: "#7C3F16", weight: bold }
  - { text: "Fuchs", color: "#2563EB", weight: bold }

# „pruefung" statt „beta": eingereicht, aber noch nichts öffentlich testbar.
status: verfuegbar

platforms:
  - os: android
    status: verfuegbar
    distribution: play-store
    storeId: eu.fehlerfuchs.snapfuchs
    since: "2026-07-20"

# 'kein-google' am 20.07.2026 gestrichen: Die App fragt beim Start den
# Kaufstatus der Pro-Fassung bei Google Play ab (Steckbrief, freiwillig:
# false). MobileReport hat dieselbe Lage und trug das Merkmal nie — dort war
# es von Anfang an richtig. Der Sachverhalt steht jetzt im Fliesstext, wo er
# erklaert werden kann, statt in einem Merkmal, das die Haelfte verschweigt.
privacy: [inhalte-lokal, keine-cloud, kein-konto, kein-tracking, werbefrei, offline-faehig]

editions:
  - id: free
    name: SnapFuchs
    public: true
    summary: Scannen, gerade rücken und als PDF ablegen – kostenlos.
    price: { model: kostenlos }
  - id: pro
    name: SnapFuchs Pro
    public: true
    emphasis: true
    # Wie bei MobileReport: Freischaltung über Google Play Billing als
    # einmaliges Kaufprodukt, kein Abo. Der Preis ist der deutsche
    # Endkundenpreis inklusive Mehrwertsteuer; Google rechnet je Land um.
    summary: Voller Funktionsumfang, freigeschaltet per einmaligem In-App-Kauf.
    price: { model: iap, amount: 3.00, currency: EUR, vatIncluded: true, recurring: false }

releases: []

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ ENTWURF – bitte gegenlesen und korrigieren.                              │
# │                                                                          │
# │ Aufbau wie bei GewerbePro: Gruppen, je Zeile ein Merkmal, je Edition     │
# │ ein Wert. Die Werte stammen aus vokabular.yaml → featureWerte            │
# │ (ja · nein · optional · teilweise · geplant · in-arbeit · fast-fertig)   │
# │ oder sind freier Text, wenn eine Zahl dazugehört („bis 5 Seiten").       │
# │                                                                          │
# │ Zusammengestellt aus dem, was üblicherweise die Grenze zwischen einer    │
# │ kostenlosen und einer bezahlten Scanner-App bildet. Was nicht stimmt,    │
# │ bitte hier ändern – die Produktseite folgt automatisch.                  │
# └──────────────────────────────────────────────────────────────────────────┘
features:
  - group: Erfassen
    items:
      - name: Seiten mit der Kamera aufnehmen
        values: { free: ja, pro: ja }
      - name: Kanten automatisch erkennen und gerade rücken
        values: { free: ja, pro: ja }
      - name: Zuschneiden und drehen von Hand
        values: { free: ja, pro: ja }
      # 1.1.0: Der Rand wird zehnmal pro Sekunde eingezeichnet - orange heisst
      # erkannt, gruen heisst stabil. Man sieht VOR dem Ausloesen, ob es sitzt.
      - name: Live-Randerkennung in der Kamera
        values: { free: ja, pro: ja }
      - name: Taschenlampe im Scanner
        values: { free: ja, pro: ja }
      - name: QR- und Barcode-Scanner
        values: { free: ja, pro: ja }
      - name: Kontrast und Farbmodus (Graustufen, Schwarzweiß, Farbe)
        values: { free: teilweise, pro: ja }
        note: Kostenlos gibt es die Voreinstellung; einstellbar ist sie in Pro.
      - name: Mehrseitige Dokumente
        values: { free: "bis 5 Seiten", pro: "ohne Begrenzung" }
      - name: Bilder aus der Galerie übernehmen
        values: { free: nein, pro: ja }
      # 1.1.0: Handy ablegen, Seite auflegen - sobald der Rahmen gruen steht,
      # loest die App selbst aus.
      - name: Stapelscan – löst automatisch aus, sobald der Rahmen sitzt
        values: { free: nein, pro: ja }

  - group: Ausgabe
    items:
      - name: Als PDF speichern
        values: { free: ja, pro: ja }
      - name: Als JPG oder PNG speichern
        values: { free: nein, pro: ja }
      - name: Teilen und drucken
        values: { free: ja, pro: ja }
      - name: Texterkennung (OCR) für durchsuchbare PDFs
        values: { free: nein, pro: geplant }
        note: Läuft auf dem Gerät, nicht auf einem Server – das ist der Grund, warum es dauert.
      - name: Seitengröße und Ränder wählen (A4, Letter, Original)
        values: { free: nein, pro: ja }

  - group: Ordnung
    items:
      - name: Zielordner selbst festlegen
        values: { free: nein, pro: ja }
      - name: Muster für Dateinamen (Datum, Zähler, eigener Text)
        values: { free: nein, pro: ja }
      - name: Seiten nachträglich umsortieren, ersetzen und löschen
        values: { free: teilweise, pro: ja }
        note: Löschen ist kostenlos; neu aufnehmen und umsortieren gehören zu Pro.

  # 1.1.0: Hilfe, Rundgang und Kontakt sind in der App selbst - wer nicht
  # weiterkommt, muss dafuer nicht die Website suchen.
  - group: Hilfe in der App
    items:
      - name: Geführter Rundgang beim ersten Start
        values: { free: ja, pro: ja }
      - name: Ausführliche Hilfe zu jeder Funktion
        values: { free: ja, pro: ja }
      - name: „Problem melden" und Kontakt direkt aus der App
        values: { free: ja, pro: ja }
      - name: Transparenz-Seite – welche Bausteine stecken drin, was geht nach außen
        values: { free: ja, pro: ja }

  - group: Erscheinungsbild
    items:
      - name: Hinweis „Erstellt mit SnapFuchs" auf der letzten Seite
        values: { free: ja, pro: nein }
        note: In Pro entfällt der Hinweis.
      - name: Dunkles Erscheinungsbild
        values: { free: ja, pro: ja }
      # 1.1.0 und ausdruecklich kostenlos - das Erscheinungsbild hinter eine
      # Bezahlschranke zu stellen waere kleinlich.
      - name: Helles Erscheinungsbild oder wie das Gerät
        values: { free: ja, pro: ja }

# Umwege: Rückschläge, die den Weg verändert haben.
#
# Hier steht NUR Vergangenes. Wo SnapFuchs gerade steht, sagt platforms[].status –
# das wird nicht doppelt aufgeschrieben. Ein Ereignis von gestern kann nicht
# veralten, ein behaupteter Stand schon; genau daran ist die alte Zeitleiste
# auf wunschliste.html gescheitert.
#
# Inhalt aus dem Arbeitslog des SnapFuchs-Projekts (Eintrag 12.07.2026,
# „Play-Ablehnung behoben: Medien-Berechtigungen raus, Photo Picker").
# Das Datum ist der Tag, an dem die Umstellung gemacht wurde – der Tag der
# Ablehnung selbst steht dort nicht. Bitte gegenlesen.
umwege:
  - datum: "2026-07-12"
    os: android
    von: pruefung
    nach: entwicklung
    grund: Ablehnung durch Google Play
    text: >-
      SnapFuchs hatte die Berechtigung, auf alle Bilder des Geräts zuzugreifen.
      Google verlangt die aber nur dort, wo eine App das ständig braucht – für den
      seltenen Fall „Bild aus der Galerie holen" ist der Fotoauswahl-Dialog von
      Android vorgesehen, der ganz ohne Berechtigung auskommt. Zu Recht, ehrlich
      gesagt: weniger Zugriff ist genau das, wofür FehlerFuchs steht. Also die drei
      Medien-Berechtigungen entfernt, auf den Android-Fotopicker umgestellt und neu
      eingereicht.

# Noch keine eigene Produktseite – SnapFuchs erscheint bisher nur auf
# produkte.html und downloads.html. Sobald die Freigabe da ist, wird eine
# Seite unter /apps/snapfuchs.html gebraucht.

