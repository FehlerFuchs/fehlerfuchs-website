slug: coppicemail
name: CoppiceMail
fullName: FehlerFuchs CoppiceMail
kind: produkt
tagline: Das lokale, datensparsame E-Mail-Programm für Belege und Büropost – der Weg Mail, Anhang, Beleg, Archiv so kurz wie möglich.
description: >-
  E-Mail-Programm mit Belegfokus: Nachricht öffnen, Anhang erkennen, als Beleg ablegen,
  archivieren – ohne Umwege und ohne Cloud-Zwang. Die Entwicklung ruht derzeit
  zugunsten von GewerbePro.
audience: [selbststaendige, unternehmen]
accent: "#0F5132"
status: pausiert

platforms:
  - os: windows
    status: pausiert
    distribution: keiner

privacy: [nur-lokal, keine-cloud, kein-tracking, werbefrei]

editions: []
releases: []

# Bild-Wortmarke. Ist sie gesetzt, ist SIE der sichtbare Titel und die
# Überschrift steht nur für Screenreader da – sonst stünde der Name doppelt.
media:
  lockup:
    src: /img/lockups/coppicemail.svg
    alt: CoppiceMail – von FehlerFuchs
    width: 1649
    height: 360
  # Noch keine Bildschirmfotos. Statt einer leeren Stelle setzt die Seite
  # Platzhalter aus dem Motivsatz ein und sagt offen, dass es welche sind.
  # Sobald echte Bilder da sind, ersetzt "screenshots:" diese Zeile.
  platzhalter: 4
# Warum es gerade so steht – in eigenen Worten.
#
# „Pausiert" allein liest sich, als sei das Projekt tot. Das ist es nicht, und
# das darf man sagen. Der Satz hängt unter 'wenn' am Status: Wird die Arbeit
# wieder aufgenommen, passt er nicht mehr, wird nicht angezeigt und die Prüfung
# meldet ihn. So kann aus einer warmen Erklärung keine veraltete Ausrede werden.
statusGrund:
  wenn: pausiert
  text: >-
    Aufgeschoben ist nicht aufgehoben. CoppiceMail ist von allem, was hier steht,
    das anspruchsvollste Stück – ein E-Mail-Programm, das Belege wirklich versteht,
    ist kein Wochenendprojekt. Es kommt, aber gerade waren mir andere Babys
    wichtiger. Ich sage lieber ehrlich „später" als „bald" und halte es dann nicht.

# Farben der Produktseite, 1:1 aus dem Quelltext der App übernommen.
# Was dort nicht steht, steht auch hier nicht – dann greift der Standard.
# Alle Kontraste rechnet das Prüfskript, sie sind nicht geschätzt.
theme:
  modus: hell
  hintergrund: "#FBF7F2"  # bg
  flaeche: "#FFFFFF"      # surface
  rand: "#E7DACC"         # line
  text: "#1A140F"         # ink
  textLeise: "#6B5B50"    # muted
  akzent: "#0F5132"       # primary – Tanne
  quelle: FehlerFuchs_CoppiceMail/app/ui/theme.py

links:
  # Die ALTE Adresse dieses Produkts, von vor dem 20.07.2026. Sie steht hier
  # aus genau einem Grund: Aus ihr entsteht die Weiterleitung, damit fremde
  # Links und Lesezeichen nicht ins Leere laufen
  # (astro/tools/weiterleitungen.mjs).
  #
  # Sie ist NICHT die Adresse der Produktseite. Die heisst /produkte/<slug>/
  # und leitet sich aus dem Slug ab - deshalb hiess das Feld frueher 'page'
  # und wurde am 21.07.2026 umbenannt: Der alte Name legte nahe, hier stehe,
  # wo das Produkt heute zu finden ist. Eine Pruefung schloss daraus, SnapFuchs
  # habe keine eigene Seite, obwohl es sie seit einem Tag hatte.
  #
  # Fehlt das Feld, gab es vorher keine eigene Seite - dann ist auch nichts
  # weiterzuleiten.
  alt_html: /apps/coppicemail.html
  contact: /kontakt.html?app=CoppiceMail&topic=interesse

notes: >-
  Pausiert, nicht eingestellt. Die Seite bleibt erreichbar und ist auf produkte.html
  als „pausiert" ausgezeichnet. Bei Wiederaufnahme genügt eine Statusänderung hier.
