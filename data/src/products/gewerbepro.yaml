faq:
  - question: Was kostet das Programm?
    answer: >-
      Die Basisversion FehlerFuchs Gewerbe ist kostenlos. GewerbePro wird später optional
      kostenpflichtig – das Grundlegende bleibt frei. Der Kauf läuft künftig über die
      sichere Kasse, sobald Shop und Lizenzserver live sind; bis dahin gibt es noch keine
      Kauf-Schaltflächen.
  - question: Was ist die „Vather"-Version?
    answer: >-
      Die interne Entwicklerversion: alle Funktionen freigeschaltet und voll editierbar.
      Sie dient Entwicklung und Test und wird nicht öffentlich verteilt. Öffentlich
      erscheinen nur Gewerbe und GewerbePro.
  - question: Wo liegen meine Daten?
    answer: >-
      Im Programmordner auf deinem PC – Datenbank, Sicherungen und PDFs. Nichts wird in
      eine Cloud übertragen.
  - question: Ersetzt es die Steuerberatung?
    answer: >-
      Nein. Es unterstützt, strukturiert und dokumentiert. Steuerliche, rechtliche oder
      fachliche Entscheidungen bleiben bei dir beziehungsweise deiner Beratung.
  - question: Wie funktioniert die E-Rechnung?
    answer: >-
      E-Rechnung ist in GewerbePro enthalten: Aus den Rechnungsdaten erzeugst du
      ZUGFeRD oder XRechnung nach EN 16931, prüfst sie mit dem KoSIT-Validator, versendest
      sie und legst sie beim Auftrag ab. Eingehende E-Rechnungen werden erkannt und
      geprüft. Auf Rechnung und Mahnung lässt sich ein GiroCode drucken.
  - question: Warum ein modularer Installer?
    answer: >-
      Nicht jeder braucht OCR, E-Rechnungsvalidatoren, Paperless oder erweiterte
      PDF-Werkzeuge. Das Ziel ist ein Installer, der Grundgerüst und Erweiterungen trennt:
      alles verfügbar, aber nur das installiert, was du wirklich nutzen willst.
  - question: Synchronisiert der Kalender direkt mit Outlook oder Google?
    answer: >-
      Der stabile Weg ist derzeit der lokale ICS-Export. Das funktioniert mit Outlook,
      Apple Kalender, Google Kalender und vielen anderen – ohne Cloud-Zwang und ohne
      Kontoanmeldung bei FehlerFuchs.
  - question: Wie weit ist das Programm?
    answer: >-
      Die offene Beta läuft. Die kostenlose Gewerbe-Edition läuft sofort; für die Pro- und
      Beta-Funktionen registrierst du dich als Beta-Tester und bekommst eine
      90-Tage-Testlizenz per E-Mail. Die alten Free- und Pro-Beta-ZIPs sind ersetzt.
  - question: Gibt es das auch für Android?
    answer: >-
      Ja, als GewerbePro Mobil. Die Companion-App gehört zur Pro-Edition und ist derzeit
      in Vorbereitung, noch nicht separat kaufbar. Freischaltung mit demselben
      Lizenzschlüssel, Abgleich per USB oder eigener Cloud. Vor Ort nutzbar:
      Auftragsentwürfe, Kunden, Katalog, Kalender, Aufgaben und Quittungsblock.

