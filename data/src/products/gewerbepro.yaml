slug: gewerbepro
name: GewerbePro
fullName: FehlerFuchs GewerbePro
kind: produkt
tagline: Das Multitool des fuchs-schlauen Selbstständigen – lokal auf dem Windows-PC, ohne Cloud und ohne Konto.
description: >-
  Büro-Software für Kleingewerbe, Selbstständige und Nebengewerbe: Kunden, Angebote,
  Aufträge, Rechnungen, E-Rechnung nach EN 16931 (ZUGFeRD/XRechnung), Belege und
  EÜR-Vorbereitung, Kalender und Postfach. Komplett lokal auf dem eigenen Rechner –
  ohne Cloud-Zwang, ohne Konto, ohne Telemetrie.
audience: [selbststaendige, unternehmen]
accent: "#B45309"
status: beta

platforms:
  - os: windows
    status: beta
    requirements: Windows 10/11 (64-bit)
    distribution: github-release
    since: "2026-07-15"        # erste öffentliche Beta 0.3.0
  # Android ist bislang nur ein Konzept, keine begonnene Umsetzung.
  - os: android
    status: konzept
    distribution: keiner

privacy: [nur-lokal, keine-cloud, kein-konto, kein-tracking, werbefrei, offline-faehig]

