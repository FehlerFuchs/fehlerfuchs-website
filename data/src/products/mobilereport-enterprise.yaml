# Bildmarke. Ist sie gesetzt, ist SIE der sichtbare Titel; die Überschrift
# bleibt für Screenreader im Dokument, nur unsichtbar.
media:
  lockup:
    src: /img/lockups/mobilereport-enterprise.svg
    alt: MobileReport Enterprise – von FehlerFuchs
    width: 2118
    height: 365
  # Noch keine Bildschirmfotos. Statt einer leeren Stelle setzt die Seite
  # Platzhalter aus dem Motivsatz ein und sagt offen, dass es welche sind.
  # Sobald echte Bilder da sind, ersetzt "screenshots:" diese Zeile.
  platzhalter: 4
# Farben der Produktseite, 1:1 aus dem Quelltext der App übernommen.
# Die helle Fassung – die Seite bleibt eine Website, kein Bildschirmfoto.
# Alle Kontraste sind vom Prüfskript gerechnet, nicht geschätzt.
theme:
  modus: hell
  hintergrund: "#F1F5F9"
  flaeche: "#FFFFFF"
  rand: "#CBD5E1"
  text: "#1E293B"
  textLeise: "#475569"
  akzent: "#0C5E74"
  quelle: FehlerFuchs Mobile Report/FehlerFuchsMR_Enterprise/01_App/lib/core/constants/app_colors.dart

links:
  page: /apps/mobilereport-enterprise.html
  release: "https://github.com/FehlerFuchs/fehlerfuchs-downloads/releases/tag/mr-ent-v1.0.1"
  contact: "/kontakt.html?app=MobileReport%20Enterprise&topic=angebot"

manifests:
  updateFeed: enterprise/latest.json

# Freie Notiz. Hier gehört hin, was sonst als Kommentar verloren ginge –
# Begründungen, offene Punkte, Absprachen.
notes: >-
  Kauf und Lizenzausgabe laufen über Digistore24 (Reseller/Merchant of Record),
  Rückgabefrist 30 Tage. Die Kassenlinks stehen bewusst hier im Modell: Ohne sie zeigt
  die Seite zwar Preise, führt aber nirgendwohin.
