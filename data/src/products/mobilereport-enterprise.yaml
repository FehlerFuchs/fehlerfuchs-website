# FehlerFuchs MobileReport Enterprise
# ===================================
#
# Diese Datei ist die Quelle. Geprüft wird sie gegen
# data/schema/product.schema.json; erzeugt daraus wird data/products.json.
#
# Bearbeitet über die Werkstatt (astro, /werkstatt/) oder von Hand — beides
# ist erlaubt. Nach jeder Änderung:
#     cd website && python tools/build_data.py

slug: mobilereport-enterprise
name: MobileReport Enterprise
fullName: FehlerFuchs MobileReport Enterprise
kind: edition
parent: mobilereport

# Wird eigenständig verkauft und erscheint deshalb trotzdem in der
# Produktübersicht – auch wenn es fachlich eine Ausbaustufe ist.
standalone: true
tagline: "Die Firmen-Stufe – Direkt-Download außerhalb von Google Play, eigenes Branding und Lizenz je Arbeitsplatz."
description: >-
  MobileReport für Unternehmen: Verteilung als APK außerhalb des Play Stores, eigenes
  Branding per .mrbrand-Datei oder als Dienstleistung, Freischaltung über
  Lizenzschlüssel je Arbeitsplatz mit Offline-Karenz. Strikt lokal, ohne Cloud-Zwang.
audience: [unternehmen]
accent: "#0C5E74"   # Farbe der App

# Der Gesamtstatus folgt der WEITESTEN Plattform. Das Prüfskript rechnet
# nach und meldet, wenn hier etwas anderes steht.
status: verfuegbar

platforms:
  - os: android
    status: verfuegbar
    requirements: "Android, Installation außerhalb des Play Stores"
    distribution: github-release
    since: "2026-07-06"

privacy: [inhalte-lokal, keine-cloud, kein-tracking, werbefrei, kein-google, offline-faehig]

editions:
  - id: white-label
    name: White-Label
    public: true
    summary: >-
      Logo und Farben selbst im Branding-Konfigurator zusammenstellen und als
      .mrbrand-Datei importieren. Der Konfigurator ist kostenlos.
    price:
      model: staffel
      currency: EUR
      vatIncluded: true
      recurring: false
      # Jede Stufe braucht ihren EIGENEN Kassenlink – sonst endet die
      # Preisangabe auf der Seite in einer Sackgasse.
      tiers:
        - { seats: 10, amount: 50, perSeat: 5, discountPercent: 0, checkout: "https://www.checkout-ds24.com/product/709260" }
        - { seats: 25, amount: 112.5, perSeat: 4.5, discountPercent: 10, checkout: "https://www.checkout-ds24.com/product/709324" }
        - { seats: 50, amount: 200, perSeat: 4, discountPercent: 20, checkout: "https://www.checkout-ds24.com/product/709326" }
        - { seats: 100, amount: 350, perSeat: 3.5, discountPercent: 30, checkout: "https://www.checkout-ds24.com/product/709328" }
        - { seats: 250, amount: 750, perSeat: 3, discountPercent: 40, checkout: "https://www.checkout-ds24.com/product/709330" }
        - { seats: 500, amount: 1250, perSeat: 2.5, discountPercent: 50, checkout: "https://www.checkout-ds24.com/product/709331" }
        - { seats: 1000, amount: 2000, perSeat: 2, discountPercent: 60, badge: Bestpreis, checkout: "https://www.checkout-ds24.com/product/709333" }
  - id: custom
    name: Custom-Branding
    public: true
    summary: >-
      Wir richten das Branding ein. Aufpreis je nach Aufwand, separat in Rechnung
      gestellt.
    price: { model: auf-anfrage }

