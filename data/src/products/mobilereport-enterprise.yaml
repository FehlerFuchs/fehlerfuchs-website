slug: mobilereport-enterprise
name: MobileReport Enterprise
fullName: FehlerFuchs MobileReport Enterprise
kind: edition
parent: mobilereport
# Fachlich eine Ausbaustufe von MobileReport, wirtschaftlich ein eigenes Produkt:
# eigener Preis, eigener Download, eigener Kaufweg. Gehört deshalb in die
# Produktübersicht – anders als der Branding-Konfigurator, der reines Zubehör ist.
standalone: true
tagline: Die Firmen-Stufe – Direkt-Download außerhalb von Google Play, eigenes Branding und Lizenz je Arbeitsplatz.
description: >-
  MobileReport für Unternehmen: Verteilung als APK außerhalb des Play Stores, eigenes
  Branding per .mrbrand-Datei oder als Dienstleistung, Freischaltung über Lizenzschlüssel
  je Arbeitsplatz mit Offline-Karenz. Strikt lokal, ohne Cloud-Zwang.
audience: [unternehmen]
accent: "#2E7D46"
status: verfuegbar

platforms:
  - os: android
    status: verfuegbar
    requirements: Android, Installation außerhalb des Play Stores
    distribution: github-release
    since: "2026-07-06"

privacy: [nur-lokal, keine-cloud, kein-tracking, werbefrei, kein-google, offline-faehig]

editions:
  - id: white-label
    name: White-Label
    public: true
    summary: >-
      Logo und Farben selbst im Branding-Konfigurator zusammenstellen und als
      .mrbrand-Datei importieren. Der Konfigurator ist kostenlos.
    price:
      model: staffel
      currency: EUR
      vatIncluded: true
      recurring: false
      # Jede Staffel hat ihren EIGENEN Kassenlink – bei Digistore24 ist jede
      # Paketgröße ein eigenes Produkt. Ohne diese Links endet die Preisangabe
      # auf der Seite in einer Sackgasse: „ab 50 €" ohne Weg zum Kauf.
      tiers:
        - { seats: 10,   amount: 50.00,   perSeat: 5.00, discountPercent: 0,
            checkout: "https://www.checkout-ds24.com/product/709260" }
        - { seats: 25,   amount: 112.50,  perSeat: 4.50, discountPercent: 10,
            checkout: "https://www.checkout-ds24.com/product/709324" }
        - { seats: 50,   amount: 200.00,  perSeat: 4.00, discountPercent: 20,
            checkout: "https://www.checkout-ds24.com/product/709326" }
        - { seats: 100,  amount: 350.00,  perSeat: 3.50, discountPercent: 30,
            checkout: "https://www.checkout-ds24.com/product/709328" }
        - { seats: 250,  amount: 750.00,  perSeat: 3.00, discountPercent: 40,
            checkout: "https://www.checkout-ds24.com/product/709330" }
        - { seats: 500,  amount: 1250.00, perSeat: 2.50, discountPercent: 50,
            checkout: "https://www.checkout-ds24.com/product/709331" }
        - { seats: 1000, amount: 2000.00, perSeat: 2.00, discountPercent: 60,
            badge: Bestpreis,
            checkout: "https://www.checkout-ds24.com/product/709333" }
  - id: custom
    name: Custom-Branding
    public: true
    summary: Wir richten das Branding ein. Aufpreis je nach Aufwand, separat in Rechnung gestellt.
    price: { model: auf-anfrage }

