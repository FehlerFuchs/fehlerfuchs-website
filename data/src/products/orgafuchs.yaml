slug: orgafuchs
name: OrgaFuchs
fullName: FehlerFuchs OrgaFuchs
kind: produkt
tagline: Der lokale Familien- und Team-Planer für Schicht- und Dienstpläne – offline, mit eigenem Sync ohne Cloud.
description: >-
  Plant Dienste, Schichten, Termine und Notizen für die ganze Familie oder ein kleines
  Team: Monatskalender, Schnelleintrag, PDF-Export als Monat, Jahr oder Blanko-Vorlage.
  Alle Daten bleiben auf den eigenen Geräten; die Synchronisation läuft über das eigene
  Heimnetz oder einen selbst gehosteten Relay – ohne Google, ohne Cloud, ohne Konto.
audience: [privat, vereine, unternehmen]
accent: "#B4652A"   # Farbe der App
# Windows ist verfügbar, Android noch nicht – der Gesamtstatus folgt der
# weitesten Plattform. Genau dieser Fall war der Grund für Status je Plattform.
status: verfuegbar

platforms:
  - os: windows
    status: verfuegbar
    requirements: Windows 10/11 (64-bit)
    distribution: github-release
    since: "2026-07-18"
  - os: android
    # Am 18.07.2026 bei Google eingereicht und noch am selben Tag abgelehnt.
    # Der Status bleibt 'pruefung': Die App liegt weiterhin beim Store, der
    # Widerspruch wird dort bearbeitet. Ein Umweg ist es NICHT – es ging
    # nichts zurueck in die Entwicklung, es steht still.
    status: pruefung
    since: "2026-07-18"
    distribution: play-store
    storeId: eu.fehlerfuchs.orgafuchs

# Ein Umweg, der keiner ist: Es ging nichts zurück in die Entwicklung. Die App
# liegt weiter beim Store, der Widerspruch läuft. 'von' und 'nach' sind deshalb
# derselbe Schritt – eine Schleife. Sie kostet nur Zeit, und genau das soll man
# sehen: Der Weg wird ein zweites Mal gegangen, ohne dass sich am Programm
# etwas geändert hätte.
umwege:
  - datum: "2026-07-18"
    os: android
    von: pruefung
    nach: pruefung
    grund: Automatisch abgelehnt, kein Mensch beteiligt
    text: >-
      Die Prüfsoftware hat die Einstellungsseite für den Gruppen-Sync als
      Bezahlschranke oder nicht deklarierten Login gewertet. Beides ist sie
      nicht: Dort trägt man eine Relay-Adresse und ein selbst gewähltes
      Gruppen-Passwort ein, um die eigenen Geräte zu verbinden. Kein Konto,
      keine Anmeldung, keine Zahlung. Am Programm wurde nichts geändert – es
      gab nichts zu ändern. Ärgerlich ist nicht die Prüfung, sondern dass eine
      unsichere Maschine durchentscheidet, statt einen Menschen hinzuzuziehen.
      Ein Blick hätte gereicht; so kostet es sieben bis vierzehn Tage.

privacy: [inhalte-lokal, keine-cloud, kein-konto, kein-tracking, werbefrei, kein-google, eigener-sync, offline-faehig]

editions:
  - id: standard
    name: OrgaFuchs
    public: true
    summary: Voller Funktionsumfang, dauerhaft kostenlos.
    price: { model: kostenlos }

releases:
