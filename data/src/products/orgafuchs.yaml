slug: orgafuchs
name: OrgaFuchs
fullName: FehlerFuchs OrgaFuchs
kind: produkt
tagline: Der lokale Familien- und Team-Planer für Schicht- und Dienstpläne – offline, mit eigenem Sync ohne Cloud.
description: >-
  Plant Dienste, Schichten, Termine und Notizen für die ganze Familie oder ein kleines
  Team: Monatskalender, Schnelleintrag, PDF-Export als Monat, Jahr oder Blanko-Vorlage.
  Alle Daten bleiben auf den eigenen Geräten; die Synchronisation läuft über das eigene
  Heimnetz oder einen selbst gehosteten Relay – ohne Google, ohne Cloud, ohne Konto.
audience: [privat, vereine, unternehmen]
accent: "#E76F51"
# Windows ist verfügbar, Android noch nicht – der Gesamtstatus folgt der
# weitesten Plattform. Genau dieser Fall war der Grund für Status je Plattform.
