    date: "2026-07-18"
    channel: stable
    os: windows
    url: https://github.com/FehlerFuchs/fehlerfuchs-downloads/releases/download/orgafuchs-v1.0.0/OrgaFuchs_Setup_1.0.0.exe
    filename: OrgaFuchs_Setup_1.0.0.exe
    size:
      bytes: null
      label: "15,3 MB"
      source: GitHub-Release-Asset (gerundet)
    sha256: "6bdd5322629f8e6053b0d8e92ac6a5cd04b38b536fbacc0355b34769c4ffa991"
    signed: false
    notes: >-
      Erstveröffentlichung. Wiederkehrende Serien, PDF als Monat/Jahr/Blanko,
      Feiertage und Schulferien je Bundesland, Geräte-Sync per QR-Code,
      Transparenz- und Open-Source-Seite in der App.

# Funktionsübersicht. Übernommen aus dem Abschnitt „Funktionen" auf
# apps/orgafuchs.html – also aus dem, was heute schon veröffentlicht ist.
# Eine Spalte, weil es nur eine Edition gibt: Die Seite zeigt daraus eine
# Funktionsübersicht statt eines Vergleichs.
