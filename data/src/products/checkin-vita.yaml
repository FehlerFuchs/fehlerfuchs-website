slug: checkin-vita
name: CheckInVita
fullName: FehlerFuchs CheckInVita
kind: produkt
tagline: Das persönliche Gesundheits-Tagebuch – Werte erfassen, Verläufe verstehen, auf Wunsch aufbereitet mit der Praxis teilen.
description: >-
  Gesundheitswerte wie Blutdruck, Gewicht, Schlaf oder Medikamenteneinnahme selbst
  erfassen und im Verlauf sehen. Auf Wunsch als aufbereitete Übersicht für den
  Praxisbesuch ausgeben. Die Daten bleiben auf dem eigenen Gerät.
audience: [privat]
accent: "#5B8A72"
status: konzept

platforms:
  - os: android
    status: konzept
    distribution: keiner
  - os: windows
    status: konzept
    distribution: keiner

privacy: [nur-lokal, keine-cloud, kein-konto, kein-tracking, werbefrei, offline-faehig]

editions:
  - id: standard
    name: CheckInVita
    public: true
    summary: Geplant als kostenlose Anwendung.
    price: { model: kostenlos }

releases: []

# Bild-Wortmarke. Ist sie gesetzt, ist SIE der sichtbare Titel und die
# Überschrift steht nur für Screenreader da – sonst stünde der Name doppelt.
media:
  lockup:
    src: /img/lockups/checkin-vita.svg
    alt: CheckInVita – von FehlerFuchs
    width: 1629
    height: 403
  # Noch keine Bildschirmfotos. Statt einer leeren Stelle setzt die Seite
  # Platzhalter aus dem Motivsatz ein und sagt offen, dass es welche sind.
  # Sobald echte Bilder da sind, ersetzt "screenshots:" diese Zeile.
  platzhalter: 4
# Farben der Produktseite, 1:1 aus dem Quelltext der App übernommen.
# Was dort nicht steht, steht auch hier nicht – dann greift der Standard.
# Alle Kontraste rechnet das Prüfskript, sie sind nicht geschätzt.
theme:
  modus: hell
  hintergrund: "#FFF7ED"  # cream
  flaeche: "#FFFFFF"      # lightSurface
  rand: "#EAD9C4"         # lightBorder
  text: "#2B160B"         # ink
  textLeise: "#6B5544"    # lightTextSoft
  akzent: "#5B8A72"       # sage
  quelle: FehlerFuchs_CheckIn_Vita/src/lib/core/theme/app_colors.dart

links:
  page: /apps/checkin-vita.html
  contact: /kontakt.html?app=CheckInVita&topic=interesse

notes: >-
  Gesundheitsdaten sind besonders schützenswert. Vor einer Veröffentlichung ist ein
  eigener, ausführlicher Datenschutzabschnitt nötig – die Merkmalsliste allein reicht hier nicht.
