slug: appinsight
name: AppInsight
fullName: FehlerFuchs AppInsight
kind: produkt
tagline: Sieh verständlich, was installierte Apps wirklich tun – Berechtigungen, Tracker, Verbrauch und Server-Kontakte.
description: >-
  Zeigt in klarer Sprache, welche Berechtigungen installierte Apps haben, welche Tracker
  sie enthalten, wie viel sie verbrauchen und mit welchen Servern sie sprechen –
  mit einer Ampel-Einordnung statt pauschaler Urteile.
audience: [privat]
accent: "#C2410C"   # Farbe der App
status: entwicklung

platforms:
  - os: android
    status: entwicklung
    distribution: keiner

privacy: [nur-lokal, keine-cloud, kein-konto, kein-tracking, werbefrei]

editions:
  - id: standard
    name: AppInsight
    public: true
    price: { model: offen }

releases: []

# Bild-Wortmarke. Ist sie gesetzt, ist SIE der sichtbare Titel und die
# Überschrift steht nur für Screenreader da – sonst stünde der Name doppelt.
media:
  lockup:
    src: /img/lockups/appinsight.svg
    alt: AppInsight – von FehlerFuchs
    width: 1500
    height: 360
  # Noch keine Bildschirmfotos. Statt einer leeren Stelle setzt die Seite
  # Platzhalter aus dem Motivsatz ein und sagt offen, dass es welche sind.
  # Sobald echte Bilder da sind, ersetzt "screenshots:" diese Zeile.
  platzhalter: 4
# Farben der Produktseite, 1:1 aus dem Quelltext der App übernommen.
# Die helle Fassung – die Seite bleibt eine Website, kein Bildschirmfoto.
# Alle Kontraste sind vom Prüfskript gerechnet, nicht geschätzt.
theme:
  modus: hell
  hintergrund: "#FFF7ED"
  flaeche: "#FFFFFF"
  rand: "#F0DFC9"
  text: "#7C3F16"
  textLeise: "#6B5B50"
  akzent: "#C2410C"
  quelle: FehlerFuchs_AppInsight/lib/core/theme/app_colors.dart

