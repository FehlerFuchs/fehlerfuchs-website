slug: cleandesk
name: CleanDesk
fullName: FehlerFuchs CleanDesk
kind: produkt
tagline: Der sichere Ordnungshelfer für Windows – findet Duplikate, große und alte Dateien, leere Ordner. Löscht nie von selbst.
description: >-
  Durchsucht Laufwerke nach Duplikaten, besonders großen oder lange nicht benutzten
  Dateien und leeren Ordnern, und zeigt verständlich, was Platz belegt. Gelöscht wird
  ausschließlich nach ausdrücklicher Bestätigung – nie automatisch.
audience: [privat, selbststaendige]
accent: "#13869E"   # Petrol für hellen Grund – Branding-Notizen, Zeile „Petrol (Lampe/Akzent)"
status: entwicklung

platforms:
  - os: windows
    status: entwicklung
    distribution: keiner

privacy: [nur-lokal, keine-cloud, kein-konto, kein-tracking, werbefrei, offline-faehig]

editions:
  - id: standard
    name: CleanDesk
    public: true
    price: { model: offen }

releases: []

# Bild-Wortmarke. Ist sie gesetzt, ist SIE der sichtbare Titel und die
# Überschrift steht nur für Screenreader da – sonst stünde der Name doppelt.
media:
  lockup:
    src: /img/lockups/cleandesk.svg
    alt: CleanDesk – von FehlerFuchs
    width: 1476
    height: 420
  # Noch keine Bildschirmfotos. Statt einer leeren Stelle setzt die Seite
  # Platzhalter aus dem Motivsatz ein und sagt offen, dass es welche sind.
  # Sobald echte Bilder da sind, ersetzt "screenshots:" diese Zeile.
  platzhalter: 4
# Farben der Produktseite, 1:1 aus dem Quelltext der App übernommen.
# Was dort nicht steht, steht auch hier nicht – dann greift der Standard.
# Alle Kontraste rechnet das Prüfskript, sie sind nicht geschätzt.
theme:
  modus: dunkel
  hintergrund: "#0B2A30"  # Petrol-Nachtblau, im Branding als bevorzugt vermerkt
  text: "#FFF7ED"         # Cremeweiß
  akzent: "#34B3CE"       # Petrol hell – laut Branding die Fassung für dunklen Grund
  quelle: FehlerFuchs_CleanDesk/01_Branding/Branding-Notizen.md

links:
  page: /apps/cleandesk.html
  contact: /kontakt.html?app=CleanDesk&topic=interesse
