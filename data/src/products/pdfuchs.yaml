slug: pdfuchs
name: PDFuchs
fullName: FehlerFuchs PDFuchs
kind: produkt
tagline: Die lokale, verständliche PDF-Vollsuite – Kernstück sind komfortabel ausfüllbare PDF-Formulare aus Word-Dateien.
description: >-
  PDF-Werkzeugkasten für den Alltag: zusammenfügen, teilen, drehen, komprimieren,
  Text erkennen – und als Kernstück aus Word-Dateien komfortabel ausfüllbare
  PDF-Formulare erzeugen. Ohne Cloud, ohne Konto.
audience: [privat, selbststaendige, unternehmen]
accent: "#9F1239"
status: entwicklung

platforms:
  - os: windows
    status: entwicklung
    distribution: keiner
  - os: android
    status: konzept
    distribution: keiner

privacy: [nur-lokal, keine-cloud, kein-konto, kein-tracking, werbefrei, offline-faehig]

editions:
  - id: standard
    name: PDFuchs
    public: true
    summary: Geplant als kostenlose Anwendung.
    price: { model: kostenlos }

releases: []

# Bild-Wortmarke. Ist sie gesetzt, ist SIE der sichtbare Titel und die
# Überschrift steht nur für Screenreader da – sonst stünde der Name doppelt.
media:
  lockup:
    src: /img/lockups/pdfuchs.svg
    alt: PDFuchs – von FehlerFuchs
    width: 1260
    height: 368
  # Noch keine Bildschirmfotos. Statt einer leeren Stelle setzt die Seite
  # Platzhalter aus dem Motivsatz ein und sagt offen, dass es welche sind.
  # Sobald echte Bilder da sind, ersetzt "screenshots:" diese Zeile.
  platzhalter: 4
# Farben der Produktseite, 1:1 aus dem Quelltext der App übernommen.
# Was dort nicht steht, steht auch hier nicht – dann greift der Standard.
# Alle Kontraste rechnet das Prüfskript, sie sind nicht geschätzt.
theme:
  modus: hell
  hintergrund: "#FBF7F2"  # paper
  flaeche: "#FFFBF7"      # panelWarm
  rand: "#EAD7DC"         # borderSoft
  text: "#2B160B"         # ink
  textLeise: "#6F4F44"    # textSecondary
  akzent: "#9F1239"       # pdfPrimary
  quelle: FehlerFuchs_PDFuchs/11_App_Flutter/pdfuchs_desktop/lib/ui/ff_tokens.dart

links:
  page: /apps/pdfuchs.html
  contact: /kontakt.html?app=PDFuchs&topic=interesse

notes: >-
  Teile des PDFuchs-Funktionsumfangs sind bereits in GewerbePro enthalten
  (QR-Code-Generator, Scannen, Ausgabeordner). Die eigenständige Suite wird daraus
  weiterentwickelt.
